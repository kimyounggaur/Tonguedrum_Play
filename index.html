<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#102028">
  <title>스틸 텅드럼 연주하기</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <style>
    :root {
      --bg: #102028;
      --panel: #173039;
      --panel-strong: #203f49;
      --teal: #5aa7a0;
      --teal-dark: #367c76;
      --bronze: #c58a3d;
      --steel: #6faeb8;
      --glow: #ffec6e;
      --ink: #f2ece0;
      --muted: #9fb2b6;
      --shadow: rgba(0, 0, 0, .34);
      --accent: var(--teal);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      background:
        linear-gradient(135deg, rgba(197, 138, 61, .16), transparent 24%),
        linear-gradient(225deg, rgba(111, 174, 184, .18), transparent 28%),
        linear-gradient(180deg, #172c33 0%, #0c1418 62%, #0b1114 100%);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    #app {
      position: relative;
      width: min(100vw, calc(100dvh * 9 / 16));
      height: min(100dvh, calc(100vw * 16 / 9));
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(90, 167, 160, .13) 0%, transparent 24%),
        linear-gradient(180deg, #152a31 0%, var(--bg) 54%, #11242d 100%);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .46);
      container-type: size;
    }

    .bg-animation {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: .72;
    }

    .bg-svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .bg-wave {
      fill: none;
      stroke: rgba(255, 236, 110, .18);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 9 18;
      animation: bgWaveDrift 7.5s linear infinite;
    }

    .bg-note,
    .bg-sparkle,
    .bg-drum {
      transform-box: fill-box;
      transform-origin: center;
    }

    .bg-note {
      fill: rgba(255, 242, 148, .72);
      filter: drop-shadow(0 0 8px rgba(255, 210, 94, .22));
      animation: bgNoteFloat 5.6s ease-in-out infinite;
    }

    .bg-note--two {
      animation-delay: -1.7s;
      animation-duration: 6.4s;
    }

    .bg-note--three {
      animation-delay: -3.1s;
      animation-duration: 7.1s;
    }

    .bg-sparkle {
      fill: rgba(255, 251, 214, .72);
      animation: bgSparklePop 2.4s ease-in-out infinite;
    }

    .bg-sparkle--two {
      animation-delay: -.8s;
    }

    .bg-sparkle--three {
      animation-delay: -1.5s;
    }

    .bg-drum {
      filter: drop-shadow(0 14px 18px rgba(0, 0, 0, .18));
      animation: bgDrumBob 4.8s ease-in-out infinite;
    }

    .bg-drum--two {
      animation-delay: -2.2s;
      animation-duration: 5.7s;
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .screen[hidden] {
      display: none;
    }

    .screen.screen-transition-pop {
      animation: screenPopIn .42s cubic-bezier(.2, 1.16, .38, 1) both;
    }

    ::view-transition-old(root) {
      animation: screenFadeOut .24s ease-out both;
    }

    ::view-transition-new(root) {
      animation: screenFadeIn .34s cubic-bezier(.2, .8, .2, 1) both;
    }

    .select-screen {
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      gap: 16px;
    }

    .select-hero {
      flex: 0 0 auto;
      padding-top: 6px;
      text-align: center;
    }

    .alpaca-drum-scene {
      display: inline-grid;
      place-items: center;
      width: 92px;
      height: 62px;
      margin: 0 auto 5px;
      pointer-events: none;
    }

    .alpaca-drum-scene--small {
      width: 54px;
      height: 36px;
      margin-bottom: 1px;
    }

    .alpaca-drum-svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, .2));
    }

    .alpaca-body {
      animation: alpacaBob 1.6s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .alpaca-mallet-left,
    .alpaca-mallet-right {
      transform-box: fill-box;
      transform-origin: 50% 86%;
    }

    .alpaca-mallet-left {
      animation: alpacaMalletLeft .72s ease-in-out infinite;
    }

    .alpaca-mallet-right {
      animation: alpacaMalletRight .72s ease-in-out infinite .18s;
    }

    .alpaca-drum-glow {
      animation: alpacaDrumGlow .72s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--teal);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 1.86rem;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .select-hero p:last-child {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: .98rem;
    }

    .select-cards {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
    }

    .drum-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(112px, 42%) 1fr;
      align-items: center;
      min-height: 0;
      overflow: hidden;
      padding: 14px;
      border: 1px solid rgba(242, 236, 224, .13);
      border-radius: 8px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--card-accent) 25%, transparent), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .025)),
        var(--panel);
      box-shadow: 0 18px 34px var(--shadow);
      cursor: pointer;
      transition: transform .26s ease, border-color .26s ease, opacity .26s ease, box-shadow .26s ease;
    }

    .drum-card:hover,
    .drum-card:focus-visible {
      border-color: color-mix(in srgb, var(--card-accent) 64%, white);
      box-shadow: 0 22px 42px rgba(0, 0, 0, .38);
      transform: translateY(-4px) scale(1.018);
    }

    .drum-card:active {
      transform: translateY(-1px) scale(.985);
    }

    .drum-card.is-dimmed {
      opacity: .45;
    }

    .drum-card.is-selected {
      border-color: color-mix(in srgb, var(--card-accent) 72%, white);
    }

    .card-media {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      max-height: 210px;
      object-fit: contain;
      filter: drop-shadow(0 14px 16px rgba(0, 0, 0, .22));
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .card-copy {
      min-width: 0;
      padding-left: 12px;
      text-align: left;
    }

    .card-label {
      display: block;
      color: color-mix(in srgb, var(--card-accent) 78%, white);
      font-size: 1.22rem;
      font-weight: 850;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .card-sub {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.42;
    }

    .ripple {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 210, 122, .45);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1);
      animation: ripple .42s ease-out forwards;
    }

    .play-screen {
      padding: max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      gap: 8px;
    }

    .play-topbar {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      grid-template-rows: auto auto;
      align-items: center;
      gap: 8px;
      min-height: 48px;
      padding: 6px;
      border: 1px solid rgba(242, 236, 224, .11);
      border-radius: 8px;
      background: rgba(16, 32, 40, .78);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .22);
    }

    .back-button,
    .guide-toggle {
      min-height: 36px;
      border: 0;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 24%, #102028);
      color: var(--ink);
      cursor: pointer;
      font-size: .88rem;
      font-weight: 780;
      transition: transform .2s ease, background .2s ease;
    }

    .back-button {
      padding: 0 10px;
      white-space: nowrap;
    }

    .back-button:hover,
    .guide-toggle:hover {
      background: color-mix(in srgb, var(--accent) 38%, #102028);
    }

    .back-button:active,
    .guide-toggle:active {
      transform: scale(.96);
    }

    .play-title {
      min-width: 0;
      text-align: center;
    }

    .play-title strong,
    .play-title span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .play-title strong {
      color: color-mix(in srgb, var(--accent) 72%, white);
      font-size: .98rem;
      letter-spacing: 0;
    }

    .play-title span {
      margin-top: 2px;
      color: var(--muted);
      font-size: .74rem;
    }

    .play-title .alpaca-drum-scene {
      display: inline-grid;
      overflow: visible;
      white-space: normal;
    }

    .volume-control {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      width: 100%;
      min-width: 0;
      padding: 0 4px 2px;
      color: var(--muted);
      font-size: .76rem;
      white-space: nowrap;
    }

    .volume-control span {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .volume-control input {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 20px;
      background: transparent;
      accent-color: var(--accent);
    }

    .volume-control input::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 48%, #0d1b21);
    }

    .volume-control input::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      margin-top: -5px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .32);
    }

    .volume-control input::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 48%, #0d1b21);
    }

    .volume-control input::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .32);
    }

    .play-main {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 4px 2px;
    }

    .drum-stage {
      position: relative;
      width: min(96%, 360px);
      aspect-ratio: var(--stage-aspect, 1 / 1);
      max-width: 96%;
      max-height: 100%;
      margin: auto;
    }

    .drum-photo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 18px 22px rgba(0, 0, 0, .30));
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .note-burst-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      overflow: visible;
      pointer-events: none;
    }

    .note-burst-dot {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size, 7px);
      height: var(--size, 7px);
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 255, 236, .98) 0 32%, rgba(255, 236, 92, .92) 38% 72%, transparent 74%);
      box-shadow:
        0 0 8px rgba(255, 244, 112, .74),
        0 0 16px rgba(255, 194, 58, .38);
      opacity: 0;
      transform: translate(-50%, -50%) scale(.35);
      animation: noteBurstPop .74s cubic-bezier(.2, .8, .2, 1) forwards;
      animation-delay: var(--delay, 0ms);
      mix-blend-mode: screen;
    }

    .note-burst-dot--soft {
      background:
        radial-gradient(circle, rgba(255, 251, 202, .88) 0 38%, rgba(255, 184, 72, .7) 44% 68%, transparent 72%);
      filter: blur(.15px);
    }

    .tongue-layer {
      position: absolute;
      inset: 0;
    }

    .tongue-hit {
      position: absolute;
      width: var(--w);
      height: var(--h);
      min-width: 36px;
      min-height: 36px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, .001);
      cursor: pointer;
      touch-action: manipulation;
      transform: translate(-50%, -50%) rotate(var(--rot));
    }

    .tongue-label {
      position: absolute;
      left: 50%;
      top: -8px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 54px;
      max-width: 96px;
      padding: 4px 7px;
      border: 1px solid rgba(255, 210, 122, .58);
      border-radius: 8px;
      background: rgba(16, 32, 40, .94);
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .34), 0 0 18px rgba(255, 210, 122, .16);
      font-size: .68rem;
      font-weight: 780;
      line-height: 1.12;
      letter-spacing: 0;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -6px) rotate(var(--label-rot)) scale(.94);
      transform-origin: center;
      transition: opacity .14s ease, transform .14s ease;
    }

    .tongue-label b {
      color: var(--glow);
      font-size: .76rem;
      font-weight: 900;
    }

    .tongue-svg {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      opacity: 0;
      overflow: visible;
      pointer-events: none;
      transform: scale(.96);
      transition: opacity .14s ease, transform .14s ease;
    }

    .tongue-glow-fill {
      fill: rgba(255, 244, 98, .46);
      opacity: 0;
      filter:
        drop-shadow(0 0 5px rgba(255, 238, 98, .68))
        drop-shadow(0 0 10px rgba(255, 192, 56, .34));
      transform-box: fill-box;
      transform-origin: center;
    }

    .tongue-outline-path {
      fill: none;
      stroke: rgba(255, 250, 160, 1);
      stroke-width: 4.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      filter:
        drop-shadow(0 0 4px rgba(255, 247, 142, .95))
        drop-shadow(0 0 9px rgba(255, 205, 54, .70));
      transform-box: fill-box;
      transform-origin: center;
    }

    .tongue-wave-path {
      fill: none;
      stroke: rgba(255, 238, 76, .92);
      stroke-width: 3.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 7 13;
      stroke-dashoffset: 0;
      opacity: 0;
      filter:
        drop-shadow(0 0 5px rgba(255, 248, 166, .9))
        drop-shadow(0 0 10px rgba(255, 204, 54, .56));
    }

    .tongue-wave-path--two {
      stroke: rgba(255, 255, 218, .86);
      stroke-width: 2.4;
      stroke-dasharray: 4 10;
    }

    .tongue-svg-path {
      fill: none;
      stroke: rgba(255, 255, 232, 1);
      stroke-width: 3.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 18 26;
      stroke-dashoffset: 0;
      opacity: 0;
      filter:
        drop-shadow(0 0 5px rgba(255, 252, 174, .95))
        drop-shadow(0 0 10px rgba(255, 206, 62, .62));
    }

    .tongue-hit::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      pointer-events: none;
    }

    .tongue-hit::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      pointer-events: none;
    }

    .tongue-hit:hover .tongue-svg,
    .tongue-hit:focus-visible .tongue-svg,
    .tongue-hit:active .tongue-svg,
    .tongue-hit.is-playing .tongue-svg {
      opacity: 1;
      transform: scale(1);
    }

    .tongue-hit:hover .tongue-outline-path,
    .tongue-hit:focus-visible .tongue-outline-path,
    .tongue-hit:active .tongue-outline-path,
    .tongue-hit.is-playing .tongue-outline-path {
      opacity: 1;
      animation: tongueOutlineWave 1.15s ease-in-out infinite;
    }

    .tongue-hit:hover .tongue-glow-fill,
    .tongue-hit:focus-visible .tongue-glow-fill,
    .tongue-hit:active .tongue-glow-fill,
    .tongue-hit.is-playing .tongue-glow-fill {
      animation: tongueGlowWave 1.15s ease-in-out infinite;
    }

    .tongue-hit:hover .tongue-wave-path,
    .tongue-hit:focus-visible .tongue-wave-path,
    .tongue-hit:active .tongue-wave-path,
    .tongue-hit.is-playing .tongue-wave-path {
      opacity: 1;
      animation: tongueWaveRipple 1.15s ease-in-out infinite;
    }

    .tongue-hit:hover .tongue-wave-path--two,
    .tongue-hit:focus-visible .tongue-wave-path--two,
    .tongue-hit:active .tongue-wave-path--two,
    .tongue-hit.is-playing .tongue-wave-path--two {
      animation-delay: -.38s;
    }

    .tongue-hit:hover .tongue-label,
    .tongue-hit:focus-visible .tongue-label {
      opacity: 1;
      transform: translate(-50%, -12px) rotate(var(--label-rot)) scale(1);
    }

    .tongue-hit:hover .tongue-svg-path,
    .tongue-hit:focus-visible .tongue-svg-path,
    .tongue-hit:active .tongue-svg-path,
    .tongue-hit.is-playing .tongue-svg-path {
      opacity: 1;
      animation: tongueSvgTrace 1.15s ease-in-out infinite;
    }

    .tongue-hit:active .tongue-outline-path,
    .tongue-hit.is-playing .tongue-outline-path {
      animation-duration: .72s;
    }

    .tongue-hit:active .tongue-glow-fill,
    .tongue-hit:active .tongue-wave-path,
    .tongue-hit.is-playing .tongue-glow-fill,
    .tongue-hit.is-playing .tongue-wave-path {
      animation-duration: .72s;
    }

    .play-footer {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 9px;
      border: 1px solid rgba(242, 236, 224, .11);
      border-radius: 8px;
      background: rgba(16, 32, 40, .82);
      box-shadow: 0 -6px 26px rgba(0, 0, 0, .18);
    }

    .guide-copy {
      min-width: 0;
    }

    .guide-summary {
      color: var(--ink);
      font-size: .82rem;
      font-weight: 720;
      line-height: 1.34;
    }

    .recent-note {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      margin-top: 6px;
      padding: 4px 9px;
      border: 1px solid rgba(255, 210, 122, .25);
      border-radius: 999px;
      color: var(--glow);
      background: rgba(255, 210, 122, .08);
      font-size: .8rem;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity .22s ease, transform .22s ease;
    }

    .recent-note.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .guide-toggle {
      align-self: start;
      padding: 0 10px;
    }

    .guide-details {
      grid-column: 1 / -1;
      min-height: 0;
    }

    .guide-details[hidden] {
      display: none;
    }

    .mapping-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      max-height: 110px;
      overflow: auto;
      padding-top: 7px;
    }

    .map-chip {
      min-width: 0;
      padding: 6px 7px;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, .055);
      font-size: .72rem;
      line-height: 1.2;
    }

    .map-chip b {
      display: block;
      color: color-mix(in srgb, var(--accent) 70%, white);
      font-size: .75rem;
      letter-spacing: 0;
    }

    :focus-visible {
      outline: 3px solid rgba(255, 210, 122, .95);
      outline-offset: 3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;

      function digitOf(code) {
        const match = /^(?:Digit|Numpad)([0-9])$/.exec(code);
        return match ? match[1] : null;
      }

      function isEditableTarget(target) {
        if (!target || typeof Element === "undefined" || !(target instanceof Element)) return false;
        return Boolean(target.closest('input, textarea, select, [contenteditable="true"]'));
      }

      function resolveShortcut(eventLike, type) {
        if (!DRUMS[type]) return null;
        if (eventLike.altKey || eventLike.metaKey) return null;
        if (eventLike.shiftKey && eventLike.ctrlKey) return null;
        const digit = digitOf(eventLike.code);
        if (digit === null) return null;
        const note = eventLike.shiftKey ? MAP.HIGH[digit] : eventLike.ctrlKey ? MAP.LOW[digit] : MAP.MID[digit];
        if (!note) return null;
        return DRUMS[type].notes.includes(note) ? note : null;
      }

      function shortcutLabelOf(noteId, type) {
        const cfg = DRUMS[type];
        if (!cfg || !cfg.notes.includes(noteId)) return "없음";
        for (const [digit, note] of Object.entries(MAP.MID)) {
          if (note === noteId) return digit;
        }
        for (const [digit, note] of Object.entries(MAP.HIGH)) {
          if (note === noteId) return `Shift+${digit}`;
        }
        for (const [digit, note] of Object.entries(MAP.LOW)) {
          if (note === noteId) return `Ctrl+${digit}`;
        }
        return "없음";
      }

      function labelOf(noteId) {
        const note = NOTE[noteId];
        return note ? `${note.ko} · ${noteId} · ${note.num}` : noteId;
      }

      function hoverLabelOf(noteId) {
        const note = NOTE[noteId];
        return note ? `${note.ko} ${note.num}` : noteId;
      }

      function inverseRotation(rot) {
        const match = /^(-?\d+(?:\.\d+)?)deg$/.exec(String(rot || "0deg"));
        return match ? `${-Number(match[1])}deg` : "0deg";
      }

      function initialTypeFromSearch(search) {
        const match = /(?:^\?|&)drum=(11|15)(?:&|$)/.exec(String(search || ""));
        return match && DRUMS[match[1]] ? match[1] : null;
      }

      function currentTimeMs() {
        return root.performance && typeof root.performance.now === "function" ? root.performance.now() : Date.now();
      }

      function shouldSuppressPointerClick(lastPointerHit, noteId, eventLike = {}, now = currentTimeMs()) {
        if (Number(eventLike.detail || 0) === 0) return false;
        if (!lastPointerHit || lastPointerHit.noteId !== noteId) return false;
        const elapsed = now - Number(lastPointerHit.time);
        return elapsed >= 0 && elapsed <= POINTER_CLICK_SUPPRESS_MS;
      }

      function ensureAudio() {
        const AudioCtor = root.AudioContext || root.webkitAudioContext;
        if (!AudioCtor) return null;
        if (!ctx) {
          ctx = new AudioCtor();
          master = ctx.createGain();
          master.gain.value = 0.82;
          master.connect(ctx.destination);

          const convolver = ctx.createConvolver();
          convolver.buffer = makeIR(ctx, 2.8, 2.2);
          const wet = ctx.createGain();
          wet.gain.value = 0.22;
          master.connect(wet);
          wet.connect(convolver);
          convolver.connect(ctx.destination);
        }
        if (ctx.state === "suspended") ctx.resume();
        return ctx;
      }

      function makeIR(audioContext, seconds, decay) {
        const rate = audioContext.sampleRate;
        const length = Math.max(1, Math.floor(rate * seconds));
        const buffer = audioContext.createBuffer(2, length, rate);
        for (let channel = 0; channel < 2; channel += 1) {
          const data = buffer.getChannelData(channel);
          for (let i = 0; i < length; i += 1) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
          }
        }
        return buffer;
      }

      function setVolume(value) {
        const audioContext = ensureAudio();
        if (!audioContext || !master) return;
        const safeValue = Math.max(0, Math.min(1, Number(value)));
        master.gain.setTargetAtTime(safeValue, audioContext.currentTime, 0.015);
      }

      function makeNoiseBurst(now, destination, amount = 0.022) {
        const duration = 0.045;
        const sampleCount = Math.max(1, Math.floor(ctx.sampleRate * duration));
        const buffer = ctx.createBuffer(1, sampleCount, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < sampleCount; i += 1) {
          data[i] = Math.random() * 2 - 1;
        }

        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const highpass = ctx.createBiquadFilter();
        highpass.type = "highpass";
        highpass.frequency.value = 900;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(amount, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        source.connect(highpass).connect(gain).connect(destination);
        source.start(now);
        source.stop(now + duration + 0.01);
      }

      function playNote(noteId, opts = {}) {
        const audioContext = ensureAudio();
        const info = NOTE[noteId];
        if (!audioContext || !master || !info) return;

        const now = audioContext.currentTime;
        const frequency = info.freq || freqFromMidi(info.midi);
        const decay = Math.max(2.2, 4.8 - (info.midi - 52) * 0.08);
        const voice = audioContext.createGain();
        voice.gain.setValueAtTime(0.0001, now);
        voice.gain.exponentialRampToValueAtTime(0.85, now + 0.009);
        voice.gain.exponentialRampToValueAtTime(0.0001, now + decay);

        const lowpass = audioContext.createBiquadFilter();
        lowpass.type = "lowpass";
        lowpass.Q.value = 0.7;
        lowpass.frequency.setValueAtTime(Math.min(7000, frequency * 8), now);
        lowpass.frequency.exponentialRampToValueAtTime(Math.max(420, frequency * 2.2), now + decay);

        let output = lowpass;
        if (audioContext.createStereoPanner && typeof opts.pan === "number") {
          const panner = audioContext.createStereoPanner();
          panner.pan.value = Math.max(-0.5, Math.min(0.5, opts.pan));
          lowpass.connect(panner);
          output = panner;
        }
        output.connect(master);

        [[1.00, 1.00], [2.01, 0.40], [2.98, 0.20], [4.16, 0.10], [5.43, 0.05]].forEach(([multiple, gainValue], index) => {
          const oscillator = audioContext.createOscillator();
          oscillator.type = index === 0 ? "sine" : "triangle";
          oscillator.frequency.value = frequency * multiple;
          if (index > 0) oscillator.detune.value = index * 1.5;
          const partialGain = audioContext.createGain();
          partialGain.gain.setValueAtTime(gainValue, now);
          partialGain.gain.exponentialRampToValueAtTime(0.0001, now + decay * (index === 0 ? 1 : 0.7));
          oscillator.connect(partialGain).connect(voice);
          oscillator.start(now);
          oscillator.stop(now + decay + 0.08);
        });

        voice.connect(lowpass);
        makeNoiseBurst(now, voice);
      }

      function runSelfTests() {
        const M = (code, mods, type) => resolveShortcut({
          code,
          shiftKey: Boolean(mods.s),
          ctrlKey: Boolean(mods.c),
          altKey: Boolean(mods.a),
          metaKey: Boolean(mods.m),
        }, type);

        console.assert(M("Digit1", {}, "11") === "C4");
        console.assert(M("Digit7", {}, "15") === "B4");
        console.assert(M("Digit8", {}, "15") === null);
        console.assert(M("Digit1", { s: 1 }, "11") === "C5");
        console.assert(M("Digit2", { s: 1 }, "11") === null);
        console.assert(M("Digit2", { s: 1 }, "15") === "D5");
        console.assert(M("Digit3", { s: 1 }, "15") === "E5");
        console.assert(M("Digit4", { s: 1 }, "15") === null);
        console.assert(M("Digit5", { c: 1 }, "11") === "G3");
        console.assert(M("Digit3", { c: 1 }, "11") === null);
        console.assert(M("Digit3", { c: 1 }, "15") === "E3");
        console.assert(M("Digit4", { c: 1 }, "15") === "F3");
        console.assert(M("Digit7", { c: 1 }, "15") === "B3");
        console.assert(M("Digit4", { s: 1, c: 1 }, "15") === null);
        console.assert(M("Digit1", { a: 1 }, "15") === null);
        console.assert(M("Digit1", { m: 1 }, "15") === null);
        console.assert(M("Numpad1", {}, "11") === "C4");
        console.assert(NOTES_11.length === 11 && NOTES_15.length === 15);
        console.assert(NOTES_11.every((note) => NOTE[note]) && NOTES_15.every((note) => NOTE[note]));
        console.assert(NOTES_11.every((note) => POS_11[note]) && NOTES_15.every((note) => POS_15[note]));
      }

      root.__tongueDrumTest = {
        NOTE,
        NOTES_11,
        NOTES_15,
        MAP,
        POS_11,
        POS_15,
        POS,
        DRUMS,
        digitOf,
        isEditableTarget,
        resolveShortcut,
        shortcutLabelOf,
        labelOf,
        hoverLabelOf,
        initialTypeFromSearch,
        freqFromMidi,
        shouldSuppressPointerClick,
      };

      runSelfTests();

      if (typeof document === "undefined") return;

      const els = {
        app: document.getElementById("app"),
        selectScreen: document.getElementById("selectScreen"),
        playScreen: document.getElementById("playScreen"),
        cards: [...document.querySelectorAll("[data-select-type]")],
        backButton: document.getElementById("backButton"),
        playTitle: document.getElementById("playTitle"),
        playSubtitle: document.getElementById("playSubtitle"),
        playMain: document.getElementById("playMain"),
        drumStage: document.getElementById("drumStage"),
        drumPhoto: document.getElementById("drumPhoto"),
        tongueLayer: document.getElementById("tongueLayer"),
        noteBurstLayer: document.getElementById("noteBurstLayer"),
        volumeSlider: document.getElementById("volumeSlider"),
        guideToggle: document.getElementById("guideToggle"),
        guideDetails: document.getElementById("guideDetails"),
        mappingGrid: document.getElementById("mappingGrid"),
        recentNote: document.getElementById("recentNote"),
        ariaLive: document.getElementById("ariaLive"),
        alpacas: [...document.querySelectorAll("[data-alpaca-drum]")],
      };

      els.alpacas.forEach((target) => {
        target.innerHTML = ALPACA_SVG;
      });

      function addRipple(button, event) {
        const rect = button.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";
        ripple.style.left = `${event.clientX - rect.left}px`;
        ripple.style.top = `${event.clientY - rect.top}px`;
        button.appendChild(ripple);
        setTimeout(() => ripple.remove(), 450);
      }

      function resetCards() {
        els.cards.forEach((card) => {
          card.classList.remove("is-selected", "is-dimmed");
        });
      }

      function shouldReduceMotion() {
        return Boolean(root.matchMedia && root.matchMedia("(prefers-reduced-motion: reduce)").matches);
      }

      function replayScreenPop(screen) {
        if (!screen || shouldReduceMotion()) return;
        screen.classList.remove("screen-transition-pop");
        void screen.offsetWidth;
        screen.classList.add("screen-transition-pop");
        setTimeout(() => screen.classList.remove("screen-transition-pop"), 480);
      }

      function runScreenTransition(update, targetScreen) {
        if (shouldReduceMotion()) {
          update();
          return;
        }
        if (document.startViewTransition) {
          const transition = document.startViewTransition(update);
          transition.finished.then(() => replayScreenPop(targetScreen)).catch(() => replayScreenPop(targetScreen));
          return;
        }
        update();
        replayScreenPop(targetScreen);
      }

      function showSelect() {
        state.currentType = null;
        clearTimeout(state.selectedTimer);
        resetCards();
        els.noteBurstLayer.innerHTML = "";
        els.playScreen.hidden = true;
        els.selectScreen.hidden = false;
        els.cards[0]?.focus({ preventScroll: true });
      }

      function showPlay(type) {
        const cfg = DRUMS[type];
        if (!cfg) return;

        state.currentType = type;
        els.app.style.setProperty("--accent", cfg.accent);
        els.playTitle.textContent = cfg.name;
        els.playSubtitle.textContent = `${cfg.range} · ${cfg.scale}`;
        els.drumPhoto.src = cfg.playImage;
        els.drumPhoto.alt = cfg.name;
        els.drumStage.style.setProperty("--stage-aspect", cfg.aspect);

        renderTongues(type);
        renderMapping(type);
        showRecentNote(null);
        els.noteBurstLayer.innerHTML = "";

        els.selectScreen.hidden = true;
        els.playScreen.hidden = false;
        requestAnimationFrame(fitStage);
        els.backButton.focus({ preventScroll: true });
      }

      function fitStage() {
        const cfg = DRUMS[state.currentType];
        if (!cfg || !els.playMain) return;
        const rect = els.playMain.getBoundingClientRect();
        const aspect = cfg.stageSize[0] / cfg.stageSize[1];
        const maxWidth = rect.width * 0.96;
        const maxHeight = rect.height * 0.98;
        let width = maxWidth;
        let height = width / aspect;
        if (height > maxHeight) {
          height = maxHeight;
          width = height * aspect;
        }
        els.drumStage.style.width = `${Math.max(1, Math.round(width))}px`;
        els.drumStage.style.height = `${Math.max(1, Math.round(height))}px`;
      }

      function renderTongues(type) {
        const cfg = DRUMS[type];
        els.tongueLayer.innerHTML = "";
        cfg.notes.forEach((noteId) => {
          const position = POS[type][noteId];
          if (!position) return;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tongue-hit";
          button.dataset.note = noteId;
          button.style.left = `${position.x}%`;
          button.style.top = `${position.y}%`;
          button.style.setProperty("--w", `${position.w}%`);
          button.style.setProperty("--h", `${position.h}%`);
          button.style.setProperty("--rot", position.rot || "0deg");
          button.style.setProperty("--label-rot", inverseRotation(position.rot));
          button.dataset.toneLabel = hoverLabelOf(noteId);
          button.setAttribute("aria-label", `${labelOf(noteId)}, 단축키 ${shortcutLabelOf(noteId, type)}`);
          const label = document.createElement("span");
          label.className = "tongue-label";
          label.setAttribute("aria-hidden", "true");
          label.innerHTML = `<b>${NOTE[noteId].num}</b>${NOTE[noteId].ko}`;
          button.appendChild(label);
          const svg = document.createElementNS(SVG_NS, "svg");
          svg.setAttribute("class", "tongue-svg");
          svg.setAttribute("viewBox", "0 0 100 100");
          svg.setAttribute("aria-hidden", "true");
          svg.setAttribute("focusable", "false");
          const clipId = `tongue-clip-${type}-${noteId}`;
          const defs = document.createElementNS(SVG_NS, "defs");
          const clip = document.createElementNS(SVG_NS, "clipPath");
          clip.setAttribute("class", "tongue-clip");
          clip.setAttribute("id", clipId);
          clip.setAttribute("clipPathUnits", "userSpaceOnUse");
          const clipPath = document.createElementNS(SVG_NS, "path");
          clipPath.setAttribute("d", SLIT_CLIP_PATH);
          clip.appendChild(clipPath);
          defs.appendChild(clip);
          svg.appendChild(defs);
          const clipped = document.createElementNS(SVG_NS, "g");
          clipped.setAttribute("class", "tongue-clipped-effects");
          clipped.setAttribute("clip-path", `url(#${clipId})`);
          const glow = document.createElementNS(SVG_NS, "path");
          glow.setAttribute("class", "tongue-glow-fill");
          glow.setAttribute("d", SLIT_CLIP_PATH);
          clipped.appendChild(glow);
          const waveOne = document.createElementNS(SVG_NS, "path");
          waveOne.setAttribute("class", "tongue-wave-path tongue-wave-path--one");
          waveOne.setAttribute("d", SLIT_TRACE_PATH);
          clipped.appendChild(waveOne);
          const waveTwo = document.createElementNS(SVG_NS, "path");
          waveTwo.setAttribute("class", "tongue-wave-path tongue-wave-path--two");
          waveTwo.setAttribute("d", SLIT_TRACE_PATH);
          clipped.appendChild(waveTwo);
          const trace = document.createElementNS(SVG_NS, "path");
          trace.setAttribute("class", "tongue-svg-path");
          trace.setAttribute("d", SLIT_TRACE_PATH);
          clipped.appendChild(trace);
          svg.appendChild(clipped);
          const outline = document.createElementNS(SVG_NS, "path");
          outline.setAttribute("class", "tongue-outline-path");
          outline.setAttribute("d", SLIT_TRACE_PATH);
          svg.appendChild(outline);
          button.appendChild(svg);
          button.addEventListener("pointerdown", (event) => {
            event.preventDefault();
            state.lastPointerHit = { noteId, time: currentTimeMs() };
            triggerNote(noteId);
          });
          button.addEventListener("click", (event) => {
            if (shouldSuppressPointerClick(state.lastPointerHit, noteId, event, currentTimeMs())) {
              event.preventDefault();
              state.lastPointerHit = null;
              return;
            }
            triggerNote(noteId);
          });
          els.tongueLayer.appendChild(button);
        });
      }

      function renderMapping(type) {
        const cfg = DRUMS[type];
        els.mappingGrid.innerHTML = "";
        cfg.notes.forEach((noteId) => {
          const chip = document.createElement("span");
          chip.className = "map-chip";
          chip.innerHTML = `<b>${shortcutLabelOf(noteId, type)}</b>${labelOf(noteId)}`;
          els.mappingGrid.appendChild(chip);
        });
      }

      function triggerNote(noteId) {
        const type = state.currentType;
        if (!type || !DRUMS[type].notes.includes(noteId)) return;
        const position = POS[type][noteId];
        const pan = position ? (position.x - 50) / 50 : 0;
        playNote(noteId, { pan });
        flashTongue(noteId);
        createNoteBurst(noteId);
        showRecentNote(noteId);
        updateAriaLive(noteId);
      }

      function createNoteBurst(noteId) {
        if (shouldReduceMotion() || !els.noteBurstLayer) return;
        const type = state.currentType;
        const position = type && POS[type] ? POS[type][noteId] : null;
        if (!position) return;
        const count = 10;
        for (let i = 0; i < count; i += 1) {
          const dot = document.createElement("span");
          const angle = (i / count * Math.PI * 2) + (Math.random() - .5) * .32;
          const distance = 24 + (i % 4) * 8;
          const size = 5 + (i % 3) * 2;
          dot.className = `note-burst-dot${i % 2 ? " note-burst-dot--soft" : ""}`;
          dot.style.setProperty("--x", `${position.x}%`);
          dot.style.setProperty("--y", `${position.y}%`);
          dot.style.setProperty("--tx", `${Math.cos(angle) * distance}px`);
          dot.style.setProperty("--ty", `${Math.sin(angle) * distance}px`);
          dot.style.setProperty("--size", `${size}px`);
          dot.style.setProperty("--delay", `${i * 12}ms`);
          els.noteBurstLayer.appendChild(dot);
          dot.addEventListener("animationend", () => dot.remove(), { once: true });
          setTimeout(() => dot.remove(), 950);
        }
      }

      function flashTongue(noteId) {
        const target = els.tongueLayer.querySelector(`.tongue-hit[data-note="${noteId}"]`);
        if (!target) return;
        target.classList.remove("is-playing");
        void target.offsetWidth;
        target.classList.add("is-playing");
        setTimeout(() => target.classList.remove("is-playing"), 240);
      }

      function showRecentNote(noteId) {
        clearTimeout(state.hideRecentTimer);
        if (!noteId) {
          els.recentNote.classList.remove("is-visible");
          return;
        }
        els.recentNote.textContent = labelOf(noteId);
        els.recentNote.classList.add("is-visible");
        state.hideRecentTimer = setTimeout(() => {
          els.recentNote.classList.remove("is-visible");
        }, 1200);
      }

      function updateAriaLive(noteId) {
        els.ariaLive.textContent = `${labelOf(noteId)} 재생`;
      }

      function enableCalibrate() {
        if (!new URLSearchParams(location.search).get("calibrate")) return;
        els.drumStage.addEventListener("pointerdown", (event) => {
          const rect = els.drumStage.getBoundingClientRect();
          const x = ((event.clientX - rect.left) / rect.width * 100).toFixed(1);
          const y = ((event.clientY - rect.top) / rect.height * 100).toFixed(1);
          console.log(`{ x:${x}, y:${y}, w:13, h:19, rot:'0deg' },`);
        }, { capture: true });
      }

      els.cards.forEach((card) => {
        card.addEventListener("click", (event) => {
          clearTimeout(state.selectedTimer);
          addRipple(card, event);
          const type = card.dataset.selectType;
          els.cards.forEach((other) => {
            other.classList.toggle("is-selected", other === card);
            other.classList.toggle("is-dimmed", other !== card);
          });
          state.selectedTimer = setTimeout(() => runScreenTransition(() => showPlay(type), els.playScreen), 280);
        });
      });

      els.backButton.addEventListener("click", () => runScreenTransition(showSelect, els.selectScreen));
      els.volumeSlider.addEventListener("input", (event) => setVolume(event.target.value));
      els.guideToggle.addEventListener("click", () => {
        const open = els.guideDetails.hidden;
        els.guideDetails.hidden = !open;
        els.guideToggle.setAttribute("aria-expanded", String(open));
        requestAnimationFrame(fitStage);
      });

      addEventListener("keydown", (event) => {
        if (event.repeat || isEditableTarget(event.target) || !state.currentType) return;
        const noteId = resolveShortcut(event, state.currentType);
        if (!noteId) return;
        event.preventDefault();
        triggerNote(noteId);
      });

      addEventListener("resize", () => requestAnimationFrame(fitStage));
      enableCalibrate();
      const initialType = initialTypeFromSearch(location.search);
      if (initialType) showPlay(initialType);
    })();
  </script>
</body>
</html>
